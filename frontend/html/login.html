<!DOCTYPE html>
<html lang="en">
<head>
    <script type="module" src="../js/verifyTheme.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles.css">
    <script src="../js/login.js"></script>
    <title>Inicio de sesión</title>
</head>
<body class="register-login">
<h1 class="h1-register-login">INICIAR SESIÓN</h1>
<div class="input-wrapper">
    <form class="login">
        <label for="email">Email</label>
        <input type="text" id="email" name="email" placeholder="email@example.com" required>
        <label for="passwd">Contraseña</label>
        <input type="password" id="passwd" name="password" placeholder="Introduzca la contraseña" required>
        <button class="confirmation-button" type="submit">Entrar</button>
    </form>
</div>
<div class="column-login">
    <a class="a-login" href="#">He olvidado la contraseña</a>
    <a class="a-login" href="register.html"> ¿No tienes cuenta? Regístrate</a>
</div>
</body>
</html>
