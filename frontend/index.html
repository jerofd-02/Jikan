<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--link rel="icon" type="image/png" href=""-->
    <title>Jikan - Inicio</title>
    <script src="./js/templateLoader.js"></script>
    <script src="./js/calendar.js"></script>
    <script src="./js/deleteTask.js"></script>
    <script src="./js/add_task.js"></script>
    <script src="./js/modifyTask.js"></script>
    <script type="module" src="./js/columnsLoader.js"></script>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<main class="homepage">

    <asside class="asside-left">

        <div class="user-information-asside">
            <a href="./html/user-profile.html">
                <img class="user-picture" src="./img/dummy_user.png" alt="Foto de perfil">
            </a>

            <div>
                <h2 class="user-name-asside">User name</h2>
                <p class="user-email-asside">UserEmail@gmail.com</p>
            </div>
        </div>

        <form role="search" class="search-asside">
            <label for="search"></label>
            <input type="text" id="search" placeholder="Buscar tablero">
            <i class="fas fa-search"></i>
        </form>

        <div class="user-borads-asside">
            <h2>tablero1</h2>
            <h2>tablero2</h2>
        </div>

    </asside>

    <div class="main-content">

        <header class="main-header">
            <h1 class="board-name">Nombre tablero</h1>
            <div class="header-buttons">
                <button class="notifications-button">
                    <i class="fas fa-bell"></i>
                </button>

                <button class="share-button">
                    <i class="fas fa-share-alt"></i>
                </button>
            </div>
        </header>

        <section class="boards-section"> 
        </section>

        <div data-template="calendar"></div>

    </div>

</main>

<div id="popup" class="oculto">
    <div class="contenido-popup">
        <h3>Nueva tarea</h3>

        <form id="form-tarea">
            <label for="texto-tarea"></label>
            <input type="text" id="texto-tarea" placeholder="Escribe la tarea" required>

            <div>
                <button type="submit">Añadir</button>
                <button type="button" id="cancelar">Cancelar</button>
            </div>
        </form>
    </div>
</div>

</body>

</html>
