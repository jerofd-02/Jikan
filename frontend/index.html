<!DOCTYPE html>
<html lang="es">

<head>
    <script type="module" src="./js/verifyTheme.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--link rel="icon" type="image/png" href=""-->
    <title>Jikan - Inicio</title>
    <script src="/node_modules/undo-manager/lib/undomanager.js"></script>
    <script src="/node_modules/sweetalert2/dist/sweetalert2.all.min.js"></script>
    <script src="./js/templateLoader.js"></script>
    <script src="./js/calendar.js"></script>
    <script src="./js/deleteTask.js" type="module"></script>
    <script src="./js/add_task.js"></script>
    <script src="./js/modifyTask.js" type="module"></script>
    <script src="./js/add_column.js"></script>
    <script src="./js/delete_column.js" type="module"></script>
    <script type="module" src="./js/columnsLoader.js"></script>
    <script type="module" src="./js/loadAsideButton.js"></script>
    <script type="module" src="./js/draggable-bar.js"></script>
    <script type="module" src="./js/createBoard.js"></script>
    <script type="module" src="./js/navigationBetweenBoards.js"></script>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/node_modules/sweetalert2/dist/sweetalert2.min.css">
</head>

<body>

<main class="homepage">

    <aside class="asside-left">

        <div class="user-information-asside">
            <a href="./html/user-profile.html">
                <img class="user-picture" src="./img/dummy_user.png" alt="Foto de perfil">
            </a>

            <div>
                <h2 class="user-name-asside">User name</h2>
                <p class="user-email-asside">UserEmail@gmail.com</p>
            </div>
        </div>

        <form role="search" class="search-asside">
            <label for="search"></label>
            <input type="text" id="search" placeholder="Buscar tablero">
            <i class="fas fa-search"></i>
        </form>

        <div class="user-borads-asside" id="boards-buttons"></div>

    </aside>

    <div class="main-content">

        <header class="main-header">
            <h1 class="board-name" id="board-title"></h1>
            <div class="header-buttons">
                <button class="notifications-button">
                    <i class="fas fa-bell"></i>
                </button>

                <button class="share-button">
                    <i class="fas fa-share-alt"></i>
                </button>
            </div>
        </header>
        <div class="main-panel">
            <section class="boards-section"></section>

            <section class="panel bottom-sheet" id="bottomSheet">
                <div class="sheet-handle-zone" id="sheetHandle">
                    <div class="handle-pill"></div>
                    <details class="acordeon" id="sheetDetails">
                        <summary>Calendario</summary>
                    </details>
                    <div class="sheet-chevron" id="sheetToggle">
                        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            width="10" height="10">
                            <polyline points="2,8 6,4 10,8"/>
                        </svg>
                    </div>
                </div>
                <div class="sheet-content">
                    <div class="contenido">
                        <div data-template="calendar"></div>
                    </div>
                </div>
            </section>
        </div>

    </div>

    <!--SECCIÓN DE POPUPS-->

    <!--popup de "deshacer"-->
    <div class="undo-popup" id="undo-popup">
        <span id="undo-popup-text">Tarea eliminada</span>
        <button onclick="undoManager.undo(); hideUndoPopup();">Deshacer</button>
    </div>

    <!--popup de "crear tablero"-->
    <div id="create-board-popup" class="overlay">
        <div class="popup">
            <button class="btn-cerrar">&times;</button>
            <h1>Organiza tus ideas</h1>
            <h2>¿Cómo deseas crear un nuevo tablero?</h2>

            <div class="create-board-buttons">
                <button id="fast-board-button">Creación rápida</button>
                <button id="custom-board-button">Creación personalizada</button>
            </div>
        </div>
    </div>

    <!--popup de creacion rapida de tablero-->
    <div id="fast-creation-popup" class="overlay">
        <div class="popup">
            <button class="btn-cerrar">&times;</button>
            <h1>Creación rápida de tablero</h1>
            <h3>Introduce el nombre del tablero</h3>
            
            <form role="input" class="popup-form">
                <label for="input"></label>
                <input type="text" class="new-board-name" placeholder="Mi nuevo tablero...">
            </form>

            <button class="create-board-button" id="create-board">Crear tablero</button>
        </div>
    </div>

</main>
</body>

</html>
