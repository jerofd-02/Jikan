<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="user-profile">
    <header></header>
    <aside>
        <div>
            <div class="user-img"></div>
            <h3>Nombre de Usuario</h3>
        </div>
        <nav>
            <ul>
                <li><button>Información de la cuenta</button></li>
                <li><button>Seguridad</button></li>
                <li><button>Notificaciones</button></li>
                <li><button>Recomendaciones</button></li>
                <li><button>Gestionar cuenta</button></li>
            </ul>
        </nav>
    </aside>
    <main>
        <section class="section" id="account-info">
            <div class="avatar-wrapper"></div>
            <form action="">
                <label for="username">Cambiar nombre de usuario:</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" value="nombre_usuario">
                    <button type="submit"></button>
                </div>
            </form>
            <form action="">
                <label for="email">Cambiar correo electrónico:</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" value="correo@ejemplo.com">
                    <button type="submit"></button>
                </div>
            </form>
        </section>
        <section class="section" id="security"></section>
        <section class="section" id="notifications"></section>
        <section class="section" id="recommendations"></section>
        <section class="section" id="account-management"></section>
    </main>
    
</body>
</html>
