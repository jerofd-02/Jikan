<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles.css">
    <title>Inicio de sesión</title>
</head>
<body class="register-login">
<h1 class="h1-register-login">INICIAR SESIÓN</h1>
<div class="input-wrapper">
    <form action="#" method="post">
        <label>Username
            <input type="text" name="user" placeholder="@example">
        </label>
        <label>Contraseña
            <input type="password" name="password" placeholder="Introduce la contraseña">
        </label>
        <button class="confirmation-button" type="submit">Entrar</button>
    </form>
</div>
<div class="column-login">
    <a class="a-login" href="#">He olvidado la contraseña</a>
    <span class="register_password_forgot">¿No tienes cuenta?
        <a class="a-login" href="register.html">Regístrate</a>
    </span>
</div>
</body>
</html>
