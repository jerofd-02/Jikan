<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Page</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
<h1 id="register-text">REGISTRARSE</h1>
<div class="input-wrapper">
    <form class="register" action="" method="POST">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Lorem Ipsum" required>
        <label for="email">Email</label>
        <input type="text" id="email" name="email" placeholder="Lorem Ipsum" required>
        <label for="passwd">Password</label>
        <input type="password" id="passwd" name="password" placeholder="Lorem Ipsum" required>
        <label for="repeat-password">Confirm password</label>
        <input type="password" id="repeat-password" name="confirm-password" placeholder="Lorem Ipsum" required>
        <button type="submit">Crear Cuenta</button>
    </form>
</div>

</body>
</html>
