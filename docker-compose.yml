version: '2.4'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: DockerfileFrontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: DockerfileBackend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: jikan_db

  mysql:
    image: mysql:8-debian
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jikan_db
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  node_modules:
    driver: local
  mysql_data:
    driver: local